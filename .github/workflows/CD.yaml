name: CD

on:
  pull_request:
    types: [closed]
    branches:
      - 'main'

jobs:
  cd:
    name: CD
    runs-on: ubuntu-latest
    if: contains(github.head_ref, 'release/')
    timeout-minutes: 10
    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2

      - name: Install node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.14.0

      - name: Get version
        id: get_version
        run: |
          VERSION=`node -p "require('./package.json').version"`
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exist
        id: tag_exist
        run: |
          exist=`git tag -l ${{ steps.get_version.outputs.version }} | wc -l`
          echo "exist=$exist" >> $GITHUB_OUTPUT

      - name: Install npm dependencies
        if: steps.tag_exist.outputs.exist == 0
        run: npm ci --ignore-scripts

      - name: Build
        if: steps.tag_exist.outputs.exist == 0
        run: npm run build

      - name: Publish to NPM
        if: steps.tag_exist.outputs.exist == 0
        uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # 4.1.5
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: 'public'
          tag: 'beta'

      - name: Config git
        if: steps.tag_exist.outputs.exist == 0
        run: |
          git config --global user.email "contact.dov118.dev@gmail.com"
          git config --global user.name "dov118"

      - name: Set tag
        if: steps.tag_exist.outputs.exist == 0
        run: |
          git tag ${{ steps.get_version.outputs.version }}
          git push --tags

